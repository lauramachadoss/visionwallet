<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VisionWallet - Gestão Financeira Inteligente</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="container">
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <i class="fas fa-wallet"></i>
                    <h1>VisionWallet</h1>
                </div>
                <p>Gestão financeira inteligente</p>
            </div>
        </header>

        <section class="dashboard">
            <div class="card saldo">
                <div class="card-header">
                    <h3>Saldo Atual</h3>
                    <i class="fas fa-piggy-bank"></i>
                </div>
                <h2 id="balance">R$ 0,00</h2>
                <p class="card-subtitle">Saldo disponível</p>
            </div>

            <div class="card receitas">
                <div class="card-header">
                    <h3>Receitas</h3>
                    <i class="fas fa-arrow-up"></i>
                </div>
                <h2 id="income">R$ 0,00</h2>
                <p class="card-subtitle">Entrada total</p>
            </div>

            <div class="card despesas">
                <div class="card-header">
                    <h3>Despesas</h3>
                    <i class="fas fa-arrow-down"></i>
                </div>
                <h2 id="expense">R$ 0,00</h2>
                <p class="card-subtitle">Saída total</p>
            </div>
        </section>

        <section class="form-container">
            <div class="form-header">
                <h2><i class="fas fa-plus-circle"></i> Nova Movimentação</h2>
            </div>

            <form id="transactionForm" class="form-grid">
                <div class="form-group">
                    <label for="description"><i class="fas fa-align-left"></i> Descrição</label>
                    <input type="text" id="description" placeholder="Ex: Compra no mercado" required>
                </div>

                <div class="form-group">
                    <label for="amount"><i class="fas fa-dollar-sign"></i> Valor</label>
                    <input type="number" id="amount" placeholder="0.00" step="0.01" required>
                </div>

                <div class="form-group">
                    <label for="category"><i class="fas fa-tag"></i> Categoria</label>
                    <select id="category">
                        <option>Alimentação</option>
                        <option>Transporte</option>
                        <option>Moradia</option>
                        <option>Lazer</option>
                        <option>Saúde</option>
                        <option>Educação</option>
                        <option>Salário</option>
                        <option>Investimentos</option>
                        <option>Outros</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="type"><i class="fas fa-exchange-alt"></i> Tipo</label>
                    <select id="type">
                        <option value="income">Receita</option>
                        <option value="expense">Despesa</option>
                    </select>
                </div>

                <button type="submit" class="btn-submit">
                    <i class="fas fa-check-circle"></i> Adicionar
                </button>
            </form>
        </section>

        <section class="history">
            <div class="history-header">
                <h2><i class="fas fa-history"></i> Histórico Financeiro</h2>
                <p class="history-subtitle">Ultimas movimentações</p>
            </div>
            <ul id="transactionList" class="transaction-list"></ul>
        </section>

    </div>

    <script src="js/script.js"></script>

</body>

</html>
